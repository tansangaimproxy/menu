<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVER PROXY VIP</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 350px;
            text-align: center;
        }

        h2 { margin-bottom: 25px; color: #00d4ff; text-transform: uppercase; letter-spacing: 2px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #00d4ff; background: rgba(255, 255, 255, 0.1); }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(90deg, #00d4ff, #090979);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="container">
    <h2>SEVER PROXY VIP</h2>
    <form id="proxyForm">
        <input type="text" placeholder="Server (vd: proxyvip.3Dunitykeyba1.com)" required>
        <input type="number" placeholder="Port (vd: 443)" required>
        
        <select>
            <option value="50000">Mệnh giá: 50.000 VNĐ</option>
        </select>
        
        <input type="text" placeholder="Seri thẻ" required>
        <input type="text" placeholder="Mã thẻ" required>
        <input type="text" placeholder="Code sever" required>
        
        <button type="submit">Xác nhận</button>
    </form>
</div>

<script>

        event.preventDefault();
        // Thông báo đã được cập nhật
        alert("Lỗi 403: Ứng dụng đã bị khoá, vì vấn đề pháp lý của các ứng dụng khác, vui lòng thử lại sau!");

</script>

</body>
</html>
